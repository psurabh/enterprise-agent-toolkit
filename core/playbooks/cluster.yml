# Agentic AI Stack — Fresh Kubernetes cluster install via kubeadm
# Option 1: always does a clean install regardless of prior state
---
- name: Fresh Kubernetes install — clean slate via kubeadm
  hosts: kube_control_plane
  gather_facts: true
  become: true
  vars:
    kube_version: "v1.31.4"
    kube_dl_base: "https://dl.k8s.io/release/{{ kube_version }}/bin/linux/amd64"
    calico_version: "v3.28.2"
    calico_manifest_url: "https://raw.githubusercontent.com/projectcalico/calico/{{ calico_version }}/manifests/calico.yaml"
    kube_user: "{{ ansible_user }}"
    kube_user_home: "/home/{{ kube_user }}"

  tasks:
    # ── Step 0: Download K8s binaries if not present ──────────────────────────
    - name: Check if kubeadm already installed at correct version
      command: kubeadm version -o short
      register: kubeadm_version_check
      ignore_errors: true
      changed_when: false

    - name: Download kubectl, kubeadm, kubelet binaries
      get_url:
        url: "{{ kube_dl_base }}/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        mode: '0755'
        timeout: 120
      loop:
        - kubectl
        - kubeadm
        - kubelet
      environment:
        http_proxy: "{{ lookup('env', 'HTTP_PROXY') }}"
        https_proxy: "{{ lookup('env', 'HTTPS_PROXY') }}"
        no_proxy: "{{ lookup('env', 'NO_PROXY') }}"
      when: >
        kubeadm_version_check.rc != 0 or
        kube_version not in (kubeadm_version_check.stdout | default(''))

    - name: Write kubelet systemd service unit
      copy:
        dest: /etc/systemd/system/kubelet.service
        mode: '0644'
        content: |
          [Unit]
          Description=kubelet: The Kubernetes Node Agent
          Documentation=https://kubernetes.io/docs/
          Wants=network-online.target
          After=network-online.target

          [Service]
          ExecStart=/usr/local/bin/kubelet
          Restart=always
          StartLimitInterval=0
          RestartSec=10

          [Install]
          WantedBy=multi-user.target

    - name: Ensure kubelet drop-in directory exists
      file:
        path: /etc/systemd/system/kubelet.service.d
        state: directory
        mode: '0755'

    - name: Write kubelet kubeadm drop-in config
      copy:
        dest: /etc/systemd/system/kubelet.service.d/10-kubeadm.conf
        mode: '0644'
        content: |
          # Note: This dropin only works with kubeadm and kubelet v1.11+
          [Service]
          Environment="KUBELET_KUBECONFIG_ARGS=--bootstrap-kubeconfig=/etc/kubernetes/bootstrap-kubelet.conf --kubeconfig=/etc/kubernetes/kubelet.conf"
          Environment="KUBELET_CONFIG_ARGS=--config=/var/lib/kubelet/config.yaml"
          EnvironmentFile=-/var/lib/kubelet/kubeadm-flags.env
          EnvironmentFile=-/etc/sysconfig/kubelet
          ExecStart=
          ExecStart=/usr/local/bin/kubelet $KUBELET_KUBECONFIG_ARGS $KUBELET_CONFIG_ARGS $KUBELET_KUBEADM_ARGS $KUBELET_EXTRA_ARGS

    - name: Stop kubelet before cleanup
      systemd:
        name: kubelet
        state: stopped
      ignore_errors: true

    - name: kubeadm reset to clear any previous cluster state
      command: kubeadm reset --force
      ignore_errors: true

    - name: Kill any process holding port 10250
      shell: fuser -k 10250/tcp 2>/dev/null || true
      ignore_errors: true

    - name: Remove all Kubernetes state directories
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/kubernetes
        - /var/lib/etcd
        - /var/lib/kubelet
        - /var/lib/kube-proxy
        - /var/run/kubernetes
        - /var/lib/cni
        - /etc/cni/net.d
        - /var/lib/calico
        - /etc/calico
        - /root/.kube
        - "{{ kube_user_home }}/.kube"
      ignore_errors: true

    - name: Remove leftover virtual network interfaces
      shell: |
        for iface in $(ip link show | grep -oP '(?<=\d: )(cni\S+|flannel\S+|calico\S+|tunl\S+|vxlan\S+|kube-ipvs\S+)' 2>/dev/null); do
          ip link delete "$iface" 2>/dev/null || true
        done
      ignore_errors: true

    - name: Restart containerd to ensure clean state
      systemd:
        name: containerd
        state: restarted
      ignore_errors: true

    - name: Enable kubelet service
      systemd:
        name: kubelet
        enabled: true
        daemon_reload: true
      ignore_errors: true

    - name: Run kubeadm init
      command: >
        kubeadm init
        --apiserver-advertise-address={{ ansible_default_ipv4.address }}
        --apiserver-cert-extra-sans=10.96.0.1,{{ ansible_default_ipv4.address }},127.0.0.1,localhost
        --service-cidr=10.96.0.0/12
        --pod-network-cidr=192.168.0.0/16
        --upload-certs
      register: kubeadm_output

    - name: Create .kube directory for ansible user
      file:
        path: "{{ kube_user_home }}/.kube"
        state: directory
        mode: '0755'
        owner: "{{ kube_user }}"
        group: "{{ kube_user }}"

    - name: Copy admin kubeconfig for ansible user
      copy:
        src: /etc/kubernetes/admin.conf
        dest: "{{ kube_user_home }}/.kube/config"
        remote_src: true
        mode: '0600'
        owner: "{{ kube_user }}"
        group: "{{ kube_user }}"

    - name: Create .kube directory for root
      file:
        path: /root/.kube
        state: directory
        mode: '0755'

    - name: Copy admin kubeconfig for root
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /root/.kube/config
        remote_src: true
        mode: '0600'

    - name: Remove control-plane taint for single-node scheduling
      command: kubectl taint nodes --all node-role.kubernetes.io/control-plane-
      become: false
      become_user: "{{ kube_user }}"
      environment:
        KUBECONFIG: "{{ kube_user_home }}/.kube/config"
      ignore_errors: true

    - name: Apply Calico CNI
      command: kubectl apply -f {{ calico_manifest_url }}
      become: false
      become_user: "{{ kube_user }}"
      environment:
        KUBECONFIG: "{{ kube_user_home }}/.kube/config"
        HTTP_PROXY: "{{ lookup('env', 'HTTP_PROXY') }}"
        HTTPS_PROXY: "{{ lookup('env', 'HTTPS_PROXY') }}"
        NO_PROXY: "{{ lookup('env', 'NO_PROXY') }}"

    - name: Wait for calico-node pods to be ready (up to 5 min)
      command: >
        kubectl wait --for=condition=ready pod
        -l k8s-app=calico-node -n kube-system --timeout=300s
      become: false
      become_user: "{{ kube_user }}"
      environment:
        KUBECONFIG: "{{ kube_user_home }}/.kube/config"
      ignore_errors: true

    - name: Wait for node to become Ready
      command: kubectl wait node --all --for=condition=Ready --timeout=300s
      become: false
      become_user: "{{ kube_user }}"
      environment:
        KUBECONFIG: "{{ kube_user_home }}/.kube/config"
      ignore_errors: true

    - name: Kubernetes cluster installed successfully
      debug:
        msg: "Kubernetes cluster is up. Run kubectl get nodes to verify."
