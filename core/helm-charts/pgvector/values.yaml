image:
  repository: pgvector/pgvector
  tag: pg16
  pullPolicy: IfNotPresent

auth:
  # Required: set via --set or a custom values file. Do not use defaults in production.
  postgresPassword: ""
  username: "agentuser"
  password: ""
  database: "agentdb"

persistence:
  size: 10Gi
  storageClassName: "local-path"

service:
  type: ClusterIP
  port: 5432

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi
